<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Broker365 logo">
  <defs>
    <linearGradient id="b365-keyhole-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3bd1"/>
      <stop offset="100%" stop-color="#2d5cff"/>
    </linearGradient>
    <linearGradient id="b365-keyhole-shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="b365-keyhole-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Rounded square background (iOS/Android app-icon style) -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#b365-keyhole-bg)"/>
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#b365-keyhole-shine)"/>

  <!-- Keyhole mark — suggests 'unlocking deals', real estate keys -->
  <g transform="translate(256 256)">
    <!-- Outer ring of keyhole -->
    <circle cx="0" cy="-28" r="56" fill="none" stroke="#ffffff" stroke-width="18"/>
    <!-- Stem -->
    <path d="M -22 20 L -32 110 L 32 110 L 22 20 Z" fill="#ffffff"/>
    <!-- Accent dot — the 'closed deal' -->
    <circle cx="0" cy="-28" r="14" fill="#c5f54a"/>
  </g>
</svg>
