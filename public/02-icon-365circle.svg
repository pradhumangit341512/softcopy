<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Broker365 logo — 365 circle">
  <defs>
    <linearGradient id="b365-circle-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a3bd1"/>
    </linearGradient>
    <linearGradient id="b365-circle-arc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5b8dff"/>
      <stop offset="100%" stop-color="#2d5cff"/>
    </linearGradient>
    <linearGradient id="b365-circle-arc2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6a3d"/>
      <stop offset="100%" stop-color="#2d5cff"/>
    </linearGradient>
  </defs>

  <!-- Deep navy rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#b365-circle-bg)"/>

  <g transform="translate(256 256)">
    <!-- Outer ring: represents continuity, 365 days -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

    <!-- Two arcs — day/night cycle, always-on -->
    <path d="M -140 0 A 140 140 0 0 1 140 0"
          fill="none" stroke="url(#b365-circle-arc)" stroke-width="18" stroke-linecap="round"/>
    <path d="M 140 0 A 140 140 0 0 1 -140 0"
          fill="none" stroke="url(#b365-circle-arc2)" stroke-width="18" stroke-linecap="round" opacity="0.5"/>

    <!-- 365 text in center — JetBrains Mono feel -->
    <text x="0" y="18" text-anchor="middle"
          font-family="Fraunces, Georgia, serif" font-weight="500" font-size="88"
          fill="#ffffff" letter-spacing="-4">365</text>
  </g>
</svg>
