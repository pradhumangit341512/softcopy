<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Broker365 key logo">
  <defs>
    <linearGradient id="b365-key-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a3bd1"/>
    </linearGradient>
    <linearGradient id="b365-key-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#b365-key-bg)"/>

  <!-- Key icon rotated 45deg — luxury real-estate feel -->
  <g transform="translate(256 256) rotate(-25)">
    <!-- Key bow (head) -->
    <circle cx="-90" cy="0" r="62" fill="none" stroke="url(#b365-key-gold)" stroke-width="22"/>
    <circle cx="-90" cy="0" r="14" fill="url(#b365-key-gold)"/>

    <!-- Key shaft -->
    <rect x="-30" y="-11" width="140" height="22" rx="2" fill="url(#b365-key-gold)"/>

    <!-- Key teeth -->
    <rect x="70" y="10" width="18" height="22" fill="url(#b365-key-gold)"/>
    <rect x="96" y="10" width="14" height="16" fill="url(#b365-key-gold)"/>
  </g>
</svg>
